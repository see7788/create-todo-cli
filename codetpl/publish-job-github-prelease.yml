  github_prelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: {{{pnpmVersion}}}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm dlx github:{{{githubPreleaseCliRepo}}} initGithubPkg
        env:
          GH_TOKEN: ${{{githubToken}}}
